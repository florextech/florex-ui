---
name: Bug Report
description: Report a bug in @florexlabs/ui
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug! Please fill out the details below.
  - type: input
    id: component
    attributes:
      label: Component
      placeholder: e.g. Button, Select, Modal
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the issue.
      render: tsx
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: e.g. 0.1.1
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
